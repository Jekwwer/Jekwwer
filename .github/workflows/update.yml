---
name: daily-svg-update

on:
  schedule:
    - cron: '0 22 * * *' # Runs daily at 10:00 PM UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-svg-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout-code
        uses: actions/checkout@v4.2.2

      - name: setup-python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: cache-pip-and-poetry
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: install-poetry
        run: pip install poetry

      - name: install-dependencies
        run: poetry install --only main --no-interaction --no-ansi

      - name: generate-updated-svg
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          poetry run python3 generate_profile_card.py

      - name: commit-updated-svg
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/profile-card.svg assets/profile-card-no-background.svg
          git commit -m "chore: update contributions stats $(date +'%Y-%m-%d %H:%M:%S')"
          git push
