<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{user.display}}'s GitHub profile card — contributions, streaks, and links." />
    <title>{{user.name.title}} Github README</title>
    <link rel="preload" href="./background.glass.svg" as="image" type="image/svg+xml" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-image: url('./background.glass.svg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .card {
        width: 100%;
        max-width: 894px;
        display: block;
      }
    </style>
  </head>
  <body>
    <object
      class="card"
      type="image/svg+xml"
      data="./profile-card.glass-no-background.svg"
      role="img"
      aria-label="{{user.name.title}} GitHub profile card"
    ></object>
  </body>
</html>
