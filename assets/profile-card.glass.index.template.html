<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{user.display}}'s GitHub profile card — contributions, streaks, and links." />
    <title>{{user.name.title}} Github README</title>
    <link rel="preload" href="./background.glass.svg" as="image" type="image/svg+xml" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-image: url('./background.glass.svg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .image-container {
        position: relative;
        width: 100%;
        max-width: 894px;
      }

      .image-container img {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .clickable {
        position: absolute;
        cursor: pointer;
      }

      /* Clickable Regions */
      #blogButton {
        left: 3%;
        top: 37.75%;
        width: 34%;
        height: 8%;
      }

      #linkedinButton {
        left: 3%;
        top: 46.5%;
        width: 34%;
        height: 8%;
      }

      #leetcodeButton {
        left: 3%;
        top: 55.5%;
        width: 34%;
        height: 8%;
      }

      #githubStats {
        right: 3%;
        top: 38%;
        width: 57%;
        height: 25%;
      }

      #githubContributionsGrid {
        left: 3%;
        bottom: 3.5%;
        width: 94%;
        height: 30%;
      }
    </style>
  </head>
  <body>
    <div class="image-container">
      <img src="./profile-card.glass-no-background.svg" alt="{{user.name.title}} GitHub profile card" />
      <!-- Clickable Regions -->
      <a
        href="{{link.blog.url}}"
        id="blogButton"
        class="clickable"
        aria-label="My Blog"
        target="_blank"
        rel="noopener noreferrer"
      ></a>
      <a
        href="{{link.linkedin.url}}"
        id="linkedinButton"
        class="clickable"
        aria-label="LinkedIn Profile"
        target="_blank"
        rel="noopener noreferrer"
      ></a>
      <a
        href="{{link.leetcode.url}}"
        id="leetcodeButton"
        class="clickable"
        aria-label="LeetCode Profile"
        target="_blank"
        rel="noopener noreferrer"
      ></a>
      <a
        href="{{link.github.url}}"
        id="githubStats"
        class="clickable"
        aria-label="GitHub Profile"
        target="_blank"
        rel="noopener noreferrer"
      ></a>
      <a
        href="{{link.github.url}}"
        id="githubContributionsGrid"
        class="clickable"
        aria-label="GitHub Contributions"
        target="_blank"
        rel="noopener noreferrer"
      ></a>
    </div>
  </body>
</html>
