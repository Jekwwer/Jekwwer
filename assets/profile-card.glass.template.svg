<svg xmlns="http://www.w3.org/2000/svg" width="894" height="690" style="font-family: Arial, sans-serif;">

  <defs>
    <!-- Glass Effect -->
    <linearGradient id="glassGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(239, 241, 245, 0.4)" />
      <stop offset="100%" stop-color="rgba(239, 241, 245, 0.4)" />
    </linearGradient>

    <filter id="glassShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(76, 79, 105, 0.75)" />
    </filter>

    <!-- Contribution Level Gradients (heat-lvl-0 … heat-lvl-5) -->
    <!-- heat-lvl-0 has no stops: transparent, shows background through -->
    <linearGradient id="heat-lvl-0" x1="0" y1="0" x2="1" y2="1">
    </linearGradient>

    <linearGradient id="heat-lvl-0-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(54, 58, 79, 0.35)" />
      <stop offset="100%" stop-color="rgba(54, 58, 79, 0.45)" />
    </linearGradient>

    <linearGradient id="heat-lvl-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(122, 198, 122, 0.85)" />
      <stop offset="100%" stop-color="rgba(122, 198, 122, 0.95)" />
    </linearGradient>

    <linearGradient id="heat-lvl-1-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(54, 58, 79, 0.35)" />
      <stop offset="100%" stop-color="rgba(54, 58, 79, 0.45)" />
    </linearGradient>

    <linearGradient id="heat-lvl-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(92, 184, 92, 0.85)" />
      <stop offset="100%" stop-color="rgba(92, 184, 92, 0.95)" />
    </linearGradient>

    <linearGradient id="heat-lvl-2-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(54, 58, 79, 0.35)" />
      <stop offset="100%" stop-color="rgba(54, 58, 79, 0.45)" />
    </linearGradient>

    <linearGradient id="heat-lvl-3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(64, 160, 43, 0.85)" />
      <stop offset="100%" stop-color="rgba(64, 160, 43, 0.95)" />
    </linearGradient>

    <linearGradient id="heat-lvl-3-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(54, 58, 79, 0.35)" />
      <stop offset="100%" stop-color="rgba(54, 58, 79, 0.45)" />
    </linearGradient>

    <linearGradient id="heat-lvl-4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(42, 107, 29, 0.65)" />
      <stop offset="100%" stop-color="rgba(42, 107, 29, 0.75)" />
    </linearGradient>

    <linearGradient id="heat-lvl-4-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(54, 58, 79, 0.35)" />
      <stop offset="100%" stop-color="rgba(54, 58, 79, 0.45)" />
    </linearGradient>

    <radialGradient id="heat-lvl-5" cx="50%" cy="50%" r="62%" fx="50%" fy="50%">
      <animateTransform attributeName="gradientTransform" attributeType="XML" type="rotate" from="0 0.5 0.5"
        to="360 0.5 0.5" dur="5s" repeatCount="indefinite" />
      <stop offset="0%" stop-color="#FFEA00" />
      <stop offset="40%" stop-color="#FFD700" />
      <stop offset="60%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </radialGradient>

    <linearGradient id="heat-lvl-5-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(54,58,79,0.35)" />
      <stop offset="50%" stop-color="rgba(54,58,79,0.65)" />
      <stop offset="100%" stop-color="rgba(54,58,79,0.35)" />
    </linearGradient>
  </defs>

  <style>
    /* Header */
    .header-title {
      font-size: 36px;
      font-weight: bold;
      fill: #24273a;
      text-shadow: 0.5px 0.5px 3px #24273a;
    }

    .header-subtitle,
    .stats-title {
      font-size: 24px;
    }

    .header-text,
    .button-text,
    .stats-text,
    .stats-value {
      font-size: 20px;
    }

    .header-subtitle,
    .stats-title,
    .header-text,
    .button-text,
    .stats-text,
    .stats-value {
      fill: #363a4f;
      text-shadow: 0.25px 0.25px 1px #24273a;
    }

    .stats-title,
    .stats-value {
      font-weight: bold;
    }

    .stats-value {
      text-anchor: end;
    }

    /* Buttons and Boxes */
    .button,
    .stats-box,
    .glass-box {
      fill: url(#glassGradient);
      filter: url(#glassShadow);
      stroke: url(#glassGradient);
      stroke-width: 3;
    }

    /* Heatmap */
    .grid-cell {
      stroke-width: 0.5px;
    }

    .legend-label {
      fill: rgba(54, 58, 79, 0.75);
      font-size: 10px;
    }
  </style>

  <title id="title">Jekwwer GitHub Profile Card</title>
  <desc id="desc">An SVG profile card showcasing links to a blog, LinkedIn, LeetCode, and GitHub stats.</desc>

  <!-- Background -->

  <!-- Header Section -->
  <rect class="glass-box" x="30" y="30" width="834" height="200" rx="25" />
  <text class="header-title" x="50" y="80">Hi, I'm Evgenii! 👋</text>
  <text class="header-subtitle" x="50" y="125">Python Enthusiast | Automation Explorer | Casual Coder</text>
  <text class="header-text" x="50" y="175">
    Experimenting with automation, playing around with Python, and sharing useful finds.
  </text>
  <text class="header-text" x="50" y="205">
    Here to simplify tasks, learn casually, and see what's interesting—one script at a time.
  </text>

  <!-- Buttons -->
  <g style="cursor: pointer;">
    <!-- Blog Button -->
    <a href="https://jekwwer.com" target="_blank">
      <rect class="button" x="30" y="260" width="300" height="45" rx="15" />
      <text class="button-text" x="50" y="290">📝 My Blog</text>
    </a>

    <!-- LinkedIn Button -->
    <a href="https://www.linkedin.com/in/evgenii-shiliaev/" target="_blank">
      <rect class="button" x="30" y="320" width="300" height="45" rx="15" />
      <text class="button-text" x="50" y="350">💼 LinkedIn Profile</text>
    </a>

    <!-- LeetCode Button -->
    <a href="https://leetcode.com/u/Jekwwer/" target="_blank">
      <rect class="button" x="30" y="380" width="300" height="45" rx="15" />
      <text class="button-text" x="50" y="410">🧩 LeetCode Profile</text>
    </a>
  </g>

  <!-- GitHub Stats -->
  <g>
    <rect class="stats-box" x="360" y="260" width="504" height="165" rx="25" />
    <text class="stats-title" x="380" y="300">📊 GitHub Stats</text>
    <text class="stats-text" x="380" y="340">Total Contributions:</text>
    <text class="stats-value" x="840" y="340">total-contributions-ph</text>
    <text class="stats-text" x="380" y="370">Current Streak:</text>
    <text class="stats-value" x="840" y="370">current-streak-ph</text>
    <text class="stats-text" x="380" y="400">Longest Streak:</text>
    <text class="stats-value" x="840" y="400">longest-streak-ph</text>
  </g>

  <rect class="stats-box" x="30" y="455" width="834" height="205" rx="25" />
  <text class="stats-title" x="50" y="495"> 📆 Contributions in the Last 52 Weeks</text>

  <!-- Contribution Grid Legend -->

  <!-- Contribution Grid -->

</svg>
