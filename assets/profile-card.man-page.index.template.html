<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="{{user.display}}'s GitHub profile card — man page style with contributions, streaks, and links."
    />
    <title>{{user.name}}(1) — man page</title>
    <link rel="preload" href="./background.man-page.svg" as="image" type="image/svg+xml" />
    <style>
      :root {
        --page-bg: #eff1f5;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --page-bg: #1e1e2e;
        }
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: var(--page-bg);
        background-image: url('./background.man-page.svg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .card {
        width: 100%;
        max-width: 894px;
        display: block;
      }
    </style>
  </head>
  <body>
    <object
      class="card"
      type="image/svg+xml"
      data="./profile-card.man-page-no-background.svg"
      role="img"
      aria-label="{{user.name}}(1) man page profile card"
    ></object>
  </body>
</html>
